<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMMC Companion</title>
    <script>
      try {
        if (localStorage.getItem('cmmc-theme') === 'dark') {
          document.documentElement.dataset.theme = 'dark'
        }
      } catch (e) {}
      try {
        var _p = localStorage.getItem('cmmc-theme-palette')
        var _valid = ['midnight','pure-black','slate-blue','sage','warm-neutral','soft-mauve']
        document.documentElement.dataset.themePalette = (_valid.indexOf(_p) !== -1) ? _p : 'midnight'
      } catch (e) {}
      try {
        var _accents = {
          violet:  ['#7C5CFC', '#A78BFA', '#221D3D'],
          blue:    ['#4C8DFF', '#7FB0FF', '#182740'],
          emerald: ['#10B981', '#5EEAD4', '#0F2A24'],
          rose:    ['#F43F5E', '#FB7185', '#3A1620'],
          gold:    ['#D4A017', '#F0C55E', '#332708'],
          cyan:    ['#22D3EE', '#67E8F9', '#0F2C33'],
        }
        var _a = _accents[localStorage.getItem('cmmc-accent-color')] || _accents.violet
        document.documentElement.style.setProperty('--user-accent', _a[0])
        document.documentElement.style.setProperty('--user-accent2', _a[1])
        document.documentElement.style.setProperty('--user-accent-soft', _a[2])
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
