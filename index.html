<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMMC Companion</title>
    <script>
      try {
        if (localStorage.getItem('cmmc-theme') === 'dark') {
          document.documentElement.dataset.theme = 'dark'
        }
      } catch (e) {}
      try {
        var _p = localStorage.getItem('cmmc-theme-palette')
        var _valid = ['midnight','pure-black','slate-blue','sage','warm-neutral','soft-mauve']
        document.documentElement.dataset.themePalette = (_valid.indexOf(_p) !== -1) ? _p : 'midnight'
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
